<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/Goidagram.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta
      name="description"
      content="Goidagram — защищенная автоматизированная система обмена информацией внутри организации."
    />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/Goidagram.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <title>Goidagram | Корпоративный мессенджер</title>

    <style>
      #initial-loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: sans-serif;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #4f46e5;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px;">
        <h1>JavaScript отключен</h1>
        <p>Для работы с системой Goidagram необходимо включить JavaScript в настройках браузера.</p>
      </div>
    </noscript>

    <div id="initial-loader">
      <div class="spinner"></div>
    </div>

    <div id="root"></div>
  </body>
</html>
