services:
  db:
    image: postgres:15
    container_name: messenger_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goida_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-messenger_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d messenger_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - messenger_net

  auth_service:
    build: ./backend/auth_service
    container_name: auth_service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-goida_secure_pass}@db:5432/${POSTGRES_DB:-messenger_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecret}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - messenger_net

  chat_service:
    build: ./backend/chat_service
    container_name: chat_service
    depends_on:
      db:
        condition: service_healthy
    networks:
      - messenger_net

  file_service:
    build: ./backend/file_service
    container_name: file_service
    depends_on:
      db:
        condition: service_healthy
    networks:
      - messenger_net

  frontend:
    build: ./frontend
    container_name: frontend_app
    networks:
      - messenger_net

  gateway:
    build: ./gateway
    container_name: messenger_gateway
    ports:
      - "80:80"
    depends_on:
      - auth_service
      - chat_service
      - file_service
      - frontend
    networks:
      - messenger_net

networks:
  messenger_net:
    driver: bridge

volumes:
  postgres_data: