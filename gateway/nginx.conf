limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;
    resolver 127.0.0.11 valid=30s;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000;
    }

    location /api/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        set $upstream_auth auth_service;
        proxy_pass http://$upstream_auth:5000;
    }

    location /api/chat {
        limit_req zone=api_limit burst=20;
        set $upstream_chat chat_service;
        proxy_pass http://$upstream_chat:5000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/files {
        client_max_body_size 11M;
        set $upstream_files file_service;
        proxy_pass http://$upstream_files:5000;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}